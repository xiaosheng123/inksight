[platformio]
default_envs = epd_42_c3

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
board_build.extra_flags =
extra_scripts = post:merge_firmware.py
lib_deps =
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.0

[env:epd_42_c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_29_c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=296
    -DEPD_HEIGHT=128
    -DEPD_PANEL_29
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_583_c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=648
    -DEPD_HEIGHT=480
    -DEPD_PANEL_583
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_75_c3]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=800
    -DEPD_HEIGHT=480
    -DEPD_PANEL_75
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wroom32e]
extends = common
board = esp32dev
upload_speed = 115200
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_29_wroom32e]
extends = common
board = esp32dev
upload_speed = 115200
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=296
    -DEPD_HEIGHT=128
    -DEPD_PANEL_29
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_583_wroom32e]
extends = common
board = esp32dev
upload_speed = 115200
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=648
    -DEPD_HEIGHT=480
    -DEPD_PANEL_583
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_75_wroom32e]
extends = common
board = esp32dev

[env:wft_4in2b]
extends = env:epd_42_c3
build_flags = 
    -D WFT_4IN2B
    -D EPD_WIDTH=400
    -D EPD_HEIGHT=300
    -D EPD_COLOR=3
    -D SPI_FREQUENCY=20000000
    -D SPI_MODE=SPI_MODE0
    -D DEBUG_EPD=1
upload_speed = 115200
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=800
    -DEPD_HEIGHT=480
    -DEPD_PANEL_75
    -DALLOW_INSECURE_FALLBACK=0

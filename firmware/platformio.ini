[platformio]
default_envs = epd_42_wft0cz15_bw_c3_promini

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
board_build.extra_flags =
extra_scripts = post:merge_firmware.py
lib_deps =
    bblanchon/ArduinoJson@^7.2.0
    tzapu/WiFiManager@^2.0.17
    mathertel/OneButton@^2.6.1
    git+https://github.com/JADE-Jerry/nongli.git
    git+https://github.com/tignioj/ArduinoUZlib

[common_gxepd]
lib_deps =
    ${common.lib_deps}
    adafruit/Adafruit GFX Library@^1.11.0
    links2004/WebSockets@^2.6.1

# ── 微雪v2 4.2" SSD1683 BW panels 软件模拟SPI驱动────────────────────────────────────
[env:epd_42_wsv2_ssd1683_c3_promini]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_c3_std]
extends = common
board = esp32-c3-devkitm-1
upload_speed = 460800
board_build.flash_mode = dio
board_build.f_flash = 40000000L
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_wroom32e]
extends = common
board = esp32dev
upload_speed = 460800
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

# ── ESP32-WROOM32E + AI Chat (语音对话) ──────────────────────
[env:epd_42_wroom32e_ai_chat]
extends = common
board = esp32dev
upload_speed = 460800
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0
    -DAUTO_BOOT_AI_CHAT=1


[platformio]
default_envs = epd_42_wsv2_ssd1683_c3_promini

[common]
platform = espressif32
framework = arduino
monitor_speed = 115200
board_build.partitions = min_spiffs.csv
board_build.filesystem = littlefs
board_build.extra_flags =
extra_scripts = post:merge_firmware.py
lib_deps =
    zinggjm/GxEPD2@^1.5.0
    adafruit/Adafruit GFX Library@^1.11.0
    links2004/WebSockets@^2.6.1

# в”Җв”Җ еҫ®йӣӘv2 4.2" SSD1683 BW panels иҪҜд»¶жЁЎжӢҹSPIй©ұеҠЁв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[env:epd_42_wsv2_ssd1683_c3_promini]
extends = common
board = esp32-c3-devkitm-1
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_c3_std]
extends = common
board = esp32-c3-devkitm-1
upload_speed = 460800
board_build.flash_mode = dio
board_build.f_flash = 40000000L
build_flags =
    -DBOARD_PROFILE_ESP32_C3
    -DARDUINO_USB_MODE=0
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

[env:epd_42_wsv2_ssd1683_wroom32e]
extends = common
board = esp32dev
upload_speed = 460800
build_flags =
    -DBOARD_PROFILE_ESP32_WROOM32E
    -DEPD_WIDTH=400
    -DEPD_HEIGHT=300
    -DEPD_PANEL_42_SSD1683_BW
    -DALLOW_INSECURE_FALLBACK=0

